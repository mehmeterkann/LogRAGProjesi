version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: lograg-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  lograg:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lograg-app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
